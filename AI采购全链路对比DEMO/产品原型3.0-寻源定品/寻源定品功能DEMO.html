<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寻源定品 · 能力演示</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0d1117;overflow:hidden;height:100vh;color:#333}
.header{height:52px;background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;display:flex;align-items:center;justify-content:center;position:relative;border-bottom:1px solid rgba(59,130,246,.2)}
.header h1{font-size:16px;font-weight:600;letter-spacing:2px}
.header-right{position:absolute;right:16px;display:flex;align-items:center;gap:8px}
.scene-badge{background:rgba(59,130,246,.15);padding:4px 12px;border-radius:12px;font-size:11px;border:1px solid rgba(59,130,246,.3);color:#93c5fd}
.scene-nav{display:flex;align-items:center;gap:6px;margin-right:12px}
.scene-nav .nav-dot{width:9px;height:9px;border-radius:50%;border:1.5px solid rgba(255,255,255,.4);background:transparent;cursor:pointer;transition:all .3s;position:relative}
.scene-nav .nav-dot:hover{border-color:#93c5fd;transform:scale(1.3)}
.scene-nav .nav-dot.active{background:#3b82f6;border-color:#3b82f6;box-shadow:0 0 6px rgba(59,130,246,.6)}
.scene-nav .nav-dot .nav-tip{position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#1e293b;color:#e2e8f0;font-size:10px;padding:4px 8px;border-radius:4px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s;border:1px solid rgba(59,130,246,.3);z-index:100}
.scene-nav .nav-dot:hover .nav-tip{opacity:1}
.main{height:calc(100vh - 52px);position:relative;overflow:hidden}
.scene-full{position:absolute;inset:0;bottom:44px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0d1117;padding:30px;opacity:0;pointer-events:none;transition:opacity .8s}
.scene-full.active{opacity:1;pointer-events:auto}
.scene-split{position:absolute;inset:0;bottom:44px;display:flex;opacity:0;pointer-events:none;transition:opacity .8s}
.scene-split.active{opacity:1;pointer-events:auto}
.half{display:flex;flex:1;position:relative;overflow:hidden}
.half-left{border-right:1px solid rgba(59,130,246,.15)}
.half-left.dimmed{opacity:.3;filter:grayscale(.8) blur(1px);transition:all .5s}
.half-right.dimmed{opacity:.3;filter:grayscale(.8) blur(1px);transition:all .5s}
.col-mall{flex:3;display:flex;flex-direction:column;background:#fff;position:relative;overflow:hidden}
.col-sys{flex:1;min-width:140px;max-width:200px;display:flex;flex-direction:column;background:linear-gradient(180deg,#0a1628,#111d35);position:relative;overflow:hidden}
.panel-hdr{height:34px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;letter-spacing:1px}
.panel-hdr.before{background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff}
.panel-hdr.after{background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff}
.panel-body{flex:1;overflow-y:auto;position:relative;padding:0}
.panel-body::-webkit-scrollbar{width:4px}
.panel-body::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
.mall-nav{background:#fff;border-bottom:1px solid #e5e7eb;padding:10px 16px;display:flex;align-items:center;gap:12px}
.mall-logo{font-weight:700;font-size:13px;color:#1f2937;display:flex;align-items:center;gap:6px}
.mall-logo::before{content:'';width:20px;height:20px;background:linear-gradient(135deg,#3b82f6,#2563eb);border-radius:4px}
.mall-search{flex:1;max-width:340px;display:flex;height:34px}
.mall-search input{flex:1;border:2px solid #e5e7eb;border-right:none;padding:0 12px;font-size:12px;border-radius:6px 0 0 6px;outline:none;background:#f9fafb}
.mall-search input.active{border-color:#3b82f6;background:#fff}
.mall-search button{background:#3b82f6;color:#fff;border:none;padding:0 16px;border-radius:0 6px 6px 0;font-size:12px;font-weight:600;cursor:pointer}
.mall-user{width:28px;height:28px;background:#e5e7eb;border-radius:50%;margin-left:auto}
.result-area{padding:12px 16px}
.result-badge{display:inline-block;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:600;margin-bottom:8px}
.result-badge.warn{background:#fef3c7;color:#92400e;border:1px solid #fde68a}
.result-badge.ok{background:#dcfce7;color:#166534;border:1px solid #86efac}
.result-badge.err{background:#fecaca;color:#991b1b;border:1px solid #fca5a5}
.data-tbl{width:100%;border-collapse:collapse;font-size:11px}
.data-tbl th{background:#f8fafc;border:1px solid #e5e7eb;padding:6px 8px;text-align:left;font-weight:600;color:#64748b}
.data-tbl td{border:1px solid #e5e7eb;padding:5px 8px;color:#374151}
.data-tbl tr:hover td{background:#f0f9ff}
.data-tbl .hl td{background:#dcfce7!important;border-color:#86efac}
.product-img{width:36px;height:36px;object-fit:contain;border-radius:4px;border:1px solid #e5e7eb;background:#f9fafb;padding:2px}
.sys-inner{display:flex;flex-direction:column;align-items:center;padding:12px 6px;height:100%;justify-content:center;gap:6px}
.sys-label{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:2px;font-weight:700}
.sys-node{width:90%;padding:8px 4px;border-radius:8px;text-align:center;position:relative;transition:all .4s}
.sys-node .n-icon{font-size:12px;display:block;margin-bottom:1px}
.sys-node .n-name{font-size:9px;font-weight:700;display:block}
.sys-node.n-blue{background:rgba(59,130,246,.1);border:2px solid rgba(59,130,246,.4);color:#93c5fd}
.sys-node.n-gray{background:rgba(148,163,184,.08);border:2px solid rgba(148,163,184,.3);color:#94a3b8}
.sys-node.n-glow{background:rgba(59,130,246,.15);border:2px solid rgba(96,165,250,.6);color:#dbeafe;box-shadow:0 0 12px rgba(59,130,246,.3)}
.sys-node.n-active{box-shadow:0 0 16px rgba(59,130,246,.5);border-color:#60a5fa;animation:nodeGlow 1.5s ease-in-out infinite}
.sys-node.n-fail{border-color:#ef4444!important;box-shadow:0 0 10px rgba(239,68,68,.3)!important}
.sys-node.n-green{background:rgba(34,197,94,.12);border:2px solid rgba(34,197,94,.5);color:#86efac;box-shadow:0 0 12px rgba(34,197,94,.3)}
.sys-node.n-green-active{box-shadow:0 0 18px rgba(34,197,94,.5);border-color:#4ade80;animation:nodeGreenGlow 1.5s ease-in-out infinite}
.sys-connector{width:2px;height:14px;background:rgba(255,255,255,.12)}
.sys-ch-row{display:flex;flex-direction:column;gap:4px;width:90%}
.sys-ch{padding:6px 3px;border-radius:5px;text-align:center;font-size:9px;font-weight:700;transition:all .4s}
.sys-ch.ch-zkh{background:rgba(59,130,246,.1);border:1.5px solid rgba(59,130,246,.35);color:#93c5fd}
.sys-ch.ch-jd{background:rgba(239,68,68,.08);border:1.5px solid rgba(239,68,68,.3);color:#fca5a5}
.sys-ch.ch-xy{background:rgba(249,115,22,.08);border:1.5px solid rgba(249,115,22,.3);color:#fdba74}
.sys-ch.ch-1688{background:rgba(245,158,11,.08);border:1.5px solid rgba(245,158,11,.3);color:#fcd34d}
.sys-ch.ch-active{box-shadow:0 0 10px currentColor}
.sys-ch.ch-fail{border-color:#ef4444!important;box-shadow:0 0 8px rgba(239,68,68,.4)!important}
.sys-ch.ch-ok{border-color:#22c55e!important;box-shadow:0 0 8px rgba(34,197,94,.4)!important}
.particle{position:absolute;border-radius:50%;pointer-events:none;z-index:50}
.node-pulse{animation:nodePulse .4s ease-out}
.action-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:60;background:rgba(0,0,0,.15);backdrop-filter:blur(1px);opacity:0;pointer-events:none;transition:opacity .4s}
.action-overlay.visible{opacity:1;pointer-events:auto}
.action-btn{padding:12px 28px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.action-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.3)}
.action-btn.blue{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff}
.action-btn.green{background:linear-gradient(135deg,#16a34a,#15803d);color:#fff}
.bottom-bar{position:absolute;bottom:0;left:0;right:0;height:44px;background:linear-gradient(135deg,#0f172a,#1e293b);display:flex;align-items:center;padding:0 20px;gap:12px;border-top:1px solid rgba(59,130,246,.15);z-index:70}
.step-text{flex:1;font-size:11px;color:rgba(255,255,255,.6);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.progress-dots{display:flex;gap:6px;align-items:center}
.progress-dots .dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .3s}
.progress-dots .dot.active{background:#3b82f6;box-shadow:0 0 6px rgba(59,130,246,.5);transform:scale(1.2)}
.progress-dots .dot.done{background:rgba(255,255,255,.5)}
.kb-hint{font-size:10px;color:rgba(255,255,255,.3);margin-left:8px}
.typing-cursor::after{content:'|';animation:blink .7s step-end infinite;color:#3b82f6;font-weight:700}
/* Cursor animation */
#simCursor{position:fixed;z-index:99999;pointer-events:none;opacity:0;transition:opacity .3s}
#simCursor.visible{opacity:1}
.cursor-ring{position:absolute;top:-18px;left:-18px;width:44px;height:44px;border-radius:50%;border:2px solid #4fc3f7;box-shadow:0 0 15px #4fc3f7,0 0 30px #4fc3f7;animation:ringPulse 1.5s ease-in-out infinite;pointer-events:none}
@keyframes ringPulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}
@keyframes cursorClick{0%{transform:scale(1)}30%{transform:scale(.6)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
.tab-bar{display:flex;gap:2px;margin:10px 0 6px;border-bottom:2px solid #e5e7eb}
.tab-btn{padding:6px 12px;font-size:10px;font-weight:600;cursor:pointer;border:none;background:transparent;color:#9ca3af;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab-btn.active{color:#3b82f6;border-bottom-color:#3b82f6}
.tab-content{min-height:60px}
.res-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border:1px solid #e5e7eb;border-radius:6px;margin:4px 0;font-size:11px}
.res-tag{padding:2px 6px;border-radius:3px;font-size:9px;font-weight:700}
.res-tag.red{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.res-tag.yellow{background:#fef3c7;color:#92400e;border:1px solid #fde68a}
.res-tag.green{background:#dcfce7;color:#166534;border:1px solid #86efac}
.pain-overlay{position:absolute;inset:0;background:rgba(220,38,38,.05);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;transition:opacity .5s;pointer-events:none;z-index:10}
.pain-overlay.show{opacity:1}
/* AI combing panel */
.ai-panel{background:#f0f9ff;border:1px solid #bfdbfe;border-radius:8px;padding:12px;margin:8px 12px;opacity:0;transform:translateY(10px);transition:all .4s}
.ai-panel.show{opacity:1;transform:translateY(0)}
.ai-title{font-size:12px;font-weight:700;color:#1d4ed8;margin-bottom:6px}
.ai-line{font-size:11px;line-height:2;color:#374151;opacity:0;transform:translateX(-10px);transition:all .3s}
.ai-line.show{opacity:1;transform:translateX(0)}
/* Comparison table */
.compare-tbl{width:100%;border-collapse:collapse;font-size:10px;margin:6px 0}
.compare-tbl th{background:#f0f9ff;border:1px solid #bfdbfe;padding:6px 5px;text-align:center;font-weight:700;color:#1d4ed8;font-size:9px}
.compare-tbl td{border:1px solid #e5e7eb;padding:5px;text-align:center;color:#374151}
.compare-tbl tr.hl td{background:#dcfce7!important;border-color:#86efac!important}
.rec-tag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:8px;font-weight:700}
.rec-tag.orange{background:#fff7ed;color:#ea580c;border:1px solid #fdba74}
.rec-tag.green{background:#f0fdf4;color:#16a34a;border:1px solid #86efac}
.rec-tag.blue{background:#eff6ff;color:#2563eb;border:1px solid #93c5fd}
/* QTS panel */
.qts-panel{background:linear-gradient(135deg,#f0fdf4,#ecfdf5);border:2px solid #86efac;border-radius:10px;padding:14px;margin:10px 12px;opacity:0;transform:scale(.95);transition:all .5s}
.qts-panel.show{opacity:1;transform:scale(1)}
.qts-line{font-size:11px;color:#374151;line-height:2}
.quote-card{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:10px 12px;margin:6px 12px;opacity:0;transform:translateY(10px);transition:all .4s;display:flex;justify-content:space-between;align-items:center;font-size:11px}
.quote-card.show{opacity:1;transform:translateY(0)}
/* Metrics */
.metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;max-width:900px;width:100%}
.metric-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:32px 20px;text-align:center;opacity:0;transform:translateY(20px);transition:all .6s}
.metric-card.show{opacity:1;transform:translateY(0)}
.metric-card:hover{border-color:rgba(59,130,246,.3);background:rgba(59,130,246,.03)}
.metric-icon{font-size:28px;margin-bottom:8px}
.metric-num{font-size:36px;font-weight:800;margin:8px 0;font-family:'Segoe UI',monospace;color:#f0f9ff}
.metric-label{font-size:12px;color:rgba(255,255,255,.5);margin-top:4px}
.metric-change{font-size:10px;color:rgba(255,255,255,.35);margin-top:8px;padding:3px 10px;background:rgba(255,255,255,.05);border-radius:8px;display:inline-block}
.slogan{font-size:20px;font-weight:700;color:#93c5fd;letter-spacing:3px;margin-top:40px;text-align:center;opacity:0;transition:opacity 1s}
.slogan.show{opacity:1}
.big-pain{background:rgba(239,68,68,.1);border:2px solid rgba(239,68,68,.3);border-radius:12px;padding:16px 24px;text-align:center;opacity:0;transform:scale(.9);transition:all .5s}
.big-pain.show{opacity:1;transform:scale(1)}
.stat-note{padding:8px 12px;border-radius:6px;font-size:11px;font-weight:600;text-align:center;margin:6px 0}
@keyframes blink{50%{opacity:0}}
@keyframes nodeGlow{0%,100%{box-shadow:0 0 12px rgba(59,130,246,.3)}50%{box-shadow:0 0 20px rgba(59,130,246,.6)}}
@keyframes nodeGreenGlow{0%,100%{box-shadow:0 0 12px rgba(34,197,94,.3)}50%{box-shadow:0 0 20px rgba(34,197,94,.6)}}
@keyframes nodePulse{0%{box-shadow:0 0 0 0 currentColor}100%{box-shadow:0 0 20px 4px transparent}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-spinner{display:inline-block;width:20px;height:20px;border:2px solid #e5e7eb;border-top-color:#3b82f6;border-radius:50%;animation:spin .8s linear infinite}
</style>
</head>
<body>
<div class="header">
  <h1>寻源定品 · 能力演示</h1>
  <div class="header-right">
    <div class="scene-nav" id="sceneNav"></div>
    <span class="scene-badge" id="sceneBadge">场景 1/4</span>
  </div>
</div>
<div class="main" id="mainArea"></div>
<div class="bottom-bar">
  <span class="step-text" id="stepText">准备开始...</span>
  <div class="progress-dots" id="dots"></div>
  <span class="kb-hint">← → Space</span>
</div>
<script>
const IMG='./images/';
let scene=0,phase='idle',animTimers=[],paused=false;
function clearAnim(){animTimers.forEach(t=>{clearTimeout(t);clearInterval(t)});animTimers=[];}
function delay(ms){return new Promise(r=>{const t=setTimeout(r,ms);animTimers.push(t);})}
function $(id){return document.getElementById(id)}
function setHTML(id,html){const el=$(id);if(el)el.innerHTML=html;}
function showEl(el){if(typeof el==='string')el=$(el);if(el)el.classList.add('show');}

// ===== CURSOR ANIMATION SYSTEM =====
let cursorEl=null,cursorRing=null,lastPos={x:60,y:60};
function initCursor(){
  cursorEl=document.createElement('div');cursorEl.id='simCursor';
  cursorEl.innerHTML='<svg width="22" height="28" viewBox="0 0 22 28"><path d="M1,1 L1,20 L6,15 L10.5,25 L13.5,23.5 L9,13.5 L16,13.5Z" fill="white" stroke="rgba(0,0,0,.4)" stroke-width="0.8"/></svg><div class="cursor-ring"></div>';
  document.body.appendChild(cursorEl);
  cursorRing=cursorEl.querySelector('.cursor-ring');
}
function hideCursor(){if(cursorEl)cursorEl.classList.remove('visible');}
async function animateCursor(target,cb){
  if(!cursorEl)initCursor();
  const el=typeof target==='string'?document.querySelector(target):target;
  if(!el){if(cb)cb();return;}
  const r=el.getBoundingClientRect();
  const tx=r.left+r.width/2,ty=r.top+r.height/2;
  cursorEl.style.transition='none';
  cursorEl.style.left=lastPos.x+'px';cursorEl.style.top=lastPos.y+'px';
  cursorEl.classList.add('visible');
  await delay(40);
  cursorEl.style.transition='left 800ms cubic-bezier(.4,0,.2,1),top 800ms cubic-bezier(.4,0,.2,1)';
  cursorEl.style.left=tx+'px';cursorEl.style.top=ty+'px';
  await delay(800);
  if(cursorRing){cursorRing.style.animation='cursorClick 350ms ease-out';setTimeout(()=>{if(cursorRing)cursorRing.style.animation='ringPulse 1.5s ease-in-out infinite';},400);}
  await delay(500);
  lastPos={x:tx,y:ty};
  if(cb)cb();
}

// ===== PARTICLE SYSTEM =====
function fireParticles(container,startEl,endEl,color,onArrive){
  if(!container||!startEl||!endEl)return;
  // Skip if elements are detached (no real bounding rect)
  const sr0=startEl.getBoundingClientRect(),er0=endEl.getBoundingClientRect();
  if((sr0.width===0&&sr0.height===0)||(er0.width===0&&er0.height===0))return;
  const cr=container.getBoundingClientRect();
  const x1=sr0.left+sr0.width/2-cr.left,y1=sr0.top+sr0.height/2-cr.top;
  const x2=er0.left+er0.width/2-cr.left,y2=er0.top+er0.height/2-cr.top;
  const dur=1200;
  for(let i=0;i<3;i++){
    const p=document.createElement('div'),size=i===0?7:4,op=i===0?1:.4-i*.1;
    p.style.cssText='position:absolute;left:'+x1+'px;top:'+y1+'px;width:'+size+'px;height:'+size+'px;border-radius:50%;background:'+color+';box-shadow:0 0 8px '+color+';z-index:'+(50-i)+';opacity:'+op+';pointer-events:none;transition:left '+(dur+i*150)+'ms cubic-bezier(.4,0,.2,1),top '+(dur+i*150)+'ms cubic-bezier(.4,0,.2,1);';
    container.appendChild(p);
    requestAnimationFrame(()=>{p.style.left=x2+'px';p.style.top=y2+'px';});
    setTimeout(()=>p.remove(),dur+i*150+200);
  }
  setTimeout(()=>{endEl.classList.add('node-pulse');setTimeout(()=>endEl.classList.remove('node-pulse'),400);if(onArrive)onArrive();},dur);
}

// ===== SYSTEM BAR BUILDERS =====
function sysBarSrcLeft(state){
  const cls=state==='fail'?'ch-fail':state==='active'?'ch-active':'';
  return '<div class="sys-inner"><span class="sys-label">传统直连</span>'
    +'<div class="sys-node n-gray" id="lMall"><span class="n-icon">🏪</span><span class="n-name">客户商城</span></div>'
    +'<div class="sys-connector"></div>'
    +'<div class="sys-ch-row">'
    +'<div class="sys-ch ch-zkh '+cls+'" id="lZKH">震坤行</div>'
    +'<div class="sys-ch ch-jd '+cls+'" id="lJD">京东工业</div>'
    +'<div class="sys-ch ch-xy '+cls+'" id="lXY">西域</div>'
    +'<div class="sys-ch ch-1688 '+cls+'" id="l1688">1688</div>'
    +'</div></div>';
}
function sysBarSrcRight(state,hasQTS){
  const apiCls=state==='active'||state==='ok'?'n-active':'';
  const chCls=state==='ok'?'ch-ok':state==='fail'?'ch-fail':'';
  const qts=hasQTS?'<div class="sys-connector" id="rcQTSLine"></div><div class="sys-node n-green" id="rQTS"><span class="n-icon">👥</span><span class="n-name">QTS线下寻源</span></div>':'';
  return '<div class="sys-inner"><span class="sys-label">物料管家增强</span>'
    +'<div class="sys-node n-gray" id="rMall"><span class="n-icon">🏪</span><span class="n-name">客户商城</span></div>'
    +'<div class="sys-connector" id="rcLine1"></div>'
    +'<div class="sys-node n-glow '+apiCls+'" id="rAPI"><span class="n-icon">🧠</span><span class="n-name">物料管家API</span></div>'
    +'<div class="sys-connector" id="rcLine2"></div>'
    +'<div class="sys-ch-row">'
    +'<div class="sys-ch ch-zkh '+chCls+'" id="rZKH">震坤行</div>'
    +'<div class="sys-ch ch-jd '+chCls+'" id="rJD">京东工业</div>'
    +'<div class="sys-ch ch-xy '+chCls+'" id="rXY">西域</div>'
    +'<div class="sys-ch ch-1688 '+chCls+'" id="r1688">1688</div>'
    +'</div>'+qts+'</div>';
}
function mallNav(keyword,filled){
  const v=filled?' value="'+keyword+'"':'',cls=filled?'active':'';

function batchTableHTML(progress){
  let h='<table class="data-tbl"><thead><tr><th>#</th><th>物料名称</th><th>规格型号</th><th>数量</th><th>状态</th></tr></thead><tbody>';

// ===== SCENE 4: Value Summary =====
function buildScene4(){
  return '<div class="scene-full active" id="s4">'
    +'<h2 style="color:#f0f9ff;font-size:22px;font-weight:700;margin-bottom:6px">📊 寻源定品 · 价值总结</h2>'
    +'<p style="color:rgba(255,255,255,.4);font-size:12px;margin-bottom:30px">物料管家寻源定品核心指标提升</p>'
    +'<div class="metric-grid">'
    +'<div class="metric-card" id="mc1"><div class="metric-icon">🎯</div><div class="metric-label">寻源匹配率</div><div class="metric-num" id="mv1">0%</div><div class="metric-change">↑ 143%</div></div>'
    +'<div class="metric-card" id="mc2"><div class="metric-icon">⚡</div><div class="metric-label">寻源周期</div><div class="metric-num" id="mv2">0min</div><div class="metric-change">↑ 860倍</div></div>'
    +'<div class="metric-card" id="mc3"><div class="metric-icon">🛡️</div><div class="metric-label">线下覆盖</div><div class="metric-num" id="mv3">0%</div><div class="metric-change">QTS兜底</div></div>'
    +'<div class="metric-card" id="mc4"><div class="metric-icon">💰</div><div class="metric-label">年节省人工成本</div><div class="metric-num" id="mv4">¥0万</div><div class="metric-change">直接降本</div></div>'
    +'</div>'
    +'<div class="slogan" id="sloganText">物料管家 · 让寻源从此精准高效</div>'
    +'</div>';
}
async function playScene4(){
  phase='playing';await delay(600);
  const cards=['mc1','mc2','mc3','mc4'];for(const id of cards){showEl(id);await delay(350);}await delay(500);
  const metrics=[
    {id:'mv1',target:80,prefix:'',suffix:'%'},
    {id:'mv2',target:5,prefix:'',suffix:'min'},
    {id:'mv3',target:92,prefix:'',suffix:'%'},
    {id:'mv4',target:120,prefix:'¥',suffix:'万'}
  ];
  metrics.forEach(m=>{
    let cur=0;const step=Math.max(1,Math.ceil(m.target/40));
    const iv=setInterval(()=>{
      cur=Math.min(cur+step,m.target);
      const el=$(m.id);if(el)el.textContent=m.prefix+cur+m.suffix;
      if(cur>=m.target)clearInterval(iv);
    },75);animTimers.push(iv);
  });
  await delay(3000);showEl('sloganText');
  phase='scene-done';updateUI();
}

// ===== CONTROLLER =====
function loadScene(idx){
  clearAnim();paused=false;phase='idle';scene=idx;
  hideCursor();
  const main=$('mainArea');
  switch(idx){
    case 0:main.innerHTML=buildScene1();playScene1Left();break;
    case 1:main.innerHTML=buildScene2();playScene2Left();break;
    case 2:main.innerHTML=buildScene3();playScene3Left();break;
    case 3:main.innerHTML=buildScene4();playScene4();break;
  }
  updateUI();
}
function triggerRight(){
  if(phase!=='left-done')return;
  if(scene===0)playScene1Right();
  else if(scene===1)playScene2Right();
  else if(scene===2)playScene3Right();
}
function nextScene(){
  if(scene<SCENES.length-1){
    const next=scene+1;
    const cur=$('mainArea').firstElementChild;
    if(cur)cur.style.opacity='0';
    setTimeout(()=>loadScene(next),500);
  }
}
function prevScene(){if(scene>0)loadScene(scene-1);}
function updateUI(){
  $('sceneBadge').textContent='场景 '+(scene+1)+'/'+SCENES.length;
  $('stepText').textContent='['+SCENES[scene].title+']';
  let dotsHtml='';for(let i=0;i<SCENES.length;i++){const cls=i<scene?'done':i===scene?'active':'';dotsHtml+='<span class="dot '+cls+'"></span>';}
  $('dots').innerHTML=dotsHtml;
  let navHtml='';for(let i=0;i<SCENES.length;i++){
    const cls=i===scene?'active':'';
    navHtml+='<span class="nav-dot '+cls+'" onclick="navToScene('+i+')"><span class="nav-tip">'+SCENES[i].title+'</span></span>';
  }
  $('sceneNav').innerHTML=navHtml;
}
function navToScene(idx){if(idx>=0&&idx<SCENES.length){clearAnim();loadScene(idx);}}
document.addEventListener('keydown',e=>{
  if(e.code==='ArrowRight'){e.preventDefault();if(phase==='left-done')triggerRight();else if(phase==='scene-done')nextScene();}
  if(e.code==='ArrowLeft'){e.preventDefault();prevScene();}
  if(e.code==='Space'){e.preventDefault();}
});
window.addEventListener('DOMContentLoaded',()=>loadScene(0));
</script>
