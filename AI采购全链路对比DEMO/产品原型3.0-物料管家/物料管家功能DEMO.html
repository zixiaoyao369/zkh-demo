<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>物料管家 · 物料梳理能力演示</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0d1117;overflow:hidden;height:100vh;color:#333}
.header{height:52px;background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;display:flex;align-items:center;justify-content:center;position:relative;border-bottom:1px solid rgba(59,130,246,.2)}
.header h1{font-size:16px;font-weight:600;letter-spacing:2px}
.header-right{position:absolute;right:16px;display:flex;align-items:center;gap:8px}
.scene-badge{background:rgba(59,130,246,.15);padding:4px 12px;border-radius:12px;font-size:11px;border:1px solid rgba(59,130,246,.3);color:#93c5fd}
/* Scene Nav Dots */
.scene-nav{display:flex;align-items:center;gap:6px;margin-right:12px}
.scene-nav .nav-dot{width:9px;height:9px;border-radius:50%;border:1.5px solid rgba(255,255,255,.4);background:transparent;cursor:pointer;transition:all .3s;position:relative}
.scene-nav .nav-dot:hover{border-color:#93c5fd;transform:scale(1.3)}
.scene-nav .nav-dot.active{background:#3b82f6;border-color:#3b82f6;box-shadow:0 0 6px rgba(59,130,246,.6)}
.scene-nav .nav-dot .nav-tip{position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#1e293b;color:#e2e8f0;font-size:10px;padding:4px 8px;border-radius:4px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s;border:1px solid rgba(59,130,246,.3);z-index:100}
.scene-nav .nav-dot:hover .nav-tip{opacity:1}
.main{height:calc(100vh - 52px);position:relative;overflow:hidden}
.scene-full{position:absolute;inset:0;bottom:44px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0d1117;padding:40px;opacity:0;pointer-events:none;transition:opacity .5s}
.scene-full.active{opacity:1;pointer-events:auto}
.scene-split{position:absolute;inset:0;bottom:44px;display:flex;opacity:0;pointer-events:none;transition:opacity .5s}
.scene-split.active{opacity:1;pointer-events:auto}
.half{display:flex;flex:1;position:relative;overflow:hidden}
.half-left{border-right:1px solid rgba(59,130,246,.15)}
.half-left.dimmed{opacity:.3;filter:grayscale(.8) blur(1px);transition:all .5s}
.half-right.dimmed{opacity:.3;filter:grayscale(.8) blur(1px);transition:all .5s}
.col-mall{flex:3;display:flex;flex-direction:column;background:#fff;position:relative;overflow:hidden}
.col-sys{flex:1;display:flex;flex-direction:column;background:linear-gradient(180deg,#0a1628,#111d35);position:relative;overflow:hidden}
.panel-hdr{height:34px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;letter-spacing:1px}
.panel-hdr.before{background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff}
.panel-hdr.after{background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff}
.panel-body{flex:1;overflow-y:auto;position:relative;padding:0}
.panel-body::-webkit-scrollbar{width:4px}
.panel-body::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
.mall-nav{background:#fff;border-bottom:1px solid #e5e7eb;padding:10px 16px;display:flex;align-items:center;gap:12px}
.mall-logo{font-weight:700;font-size:13px;color:#1f2937;display:flex;align-items:center;gap:6px}
.mall-logo::before{content:'';width:20px;height:20px;background:linear-gradient(135deg,#3b82f6,#2563eb);border-radius:4px}
.mall-search{flex:1;max-width:340px;display:flex;height:34px}
.mall-search input{flex:1;border:2px solid #e5e7eb;border-right:none;padding:0 12px;font-size:12px;border-radius:6px 0 0 6px;outline:none;background:#f9fafb}
.mall-search input.active{border-color:#3b82f6;background:#fff}
.mall-search button{background:#3b82f6;color:#fff;border:none;padding:0 16px;border-radius:0 6px 6px 0;font-size:12px;font-weight:600;cursor:pointer}
.mall-user{width:28px;height:28px;background:#e5e7eb;border-radius:50%;margin-left:auto}
.mall-sidebar{position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,#3b82f6,#8b5cf6);opacity:.3}
.result-area{padding:12px 16px}
.result-badge{display:inline-block;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:600;margin-bottom:8px}
.result-badge.warn{background:#fef3c7;color:#92400e;border:1px solid #fde68a}
.result-badge.ok{background:#dcfce7;color:#166534;border:1px solid #86efac}
.result-badge.err{background:#fecaca;color:#991b1b;border:1px solid #fca5a5}
.data-tbl{width:100%;border-collapse:collapse;font-size:11px}
.data-tbl th{background:#f8fafc;border:1px solid #e5e7eb;padding:6px 8px;text-align:left;font-weight:600;color:#64748b}
.data-tbl td{border:1px solid #e5e7eb;padding:5px 8px;color:#374151}
.data-tbl tr:hover td{background:#f0f9ff}
.data-tbl .hl td{background:#dcfce7!important;border-color:#86efac}
.product-img{width:36px;height:36px;object-fit:contain;border-radius:4px;border:1px solid #e5e7eb;background:#f9fafb;padding:2px}
.sys-inner{display:flex;flex-direction:column;align-items:center;padding:16px 8px;height:100%;justify-content:center;gap:8px}
.sys-label{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:2px;text-transform:uppercase}
.sys-node{width:88%;padding:10px 6px;border-radius:8px;text-align:center;position:relative;transition:all .4s}
.sys-node .n-icon{font-size:14px;display:block;margin-bottom:2px}
.sys-node .n-name{font-size:10px;font-weight:700;display:block}
.sys-node .n-desc{font-size:8px;display:block;margin-top:2px;opacity:.6}
.sys-node.n-blue{background:rgba(59,130,246,.1);border:2px solid rgba(59,130,246,.4);color:#93c5fd}
.sys-node.n-gray{background:rgba(148,163,184,.08);border:2px solid rgba(148,163,184,.3);color:#94a3b8}
.sys-node.n-glow{background:rgba(59,130,246,.15);border:2px solid rgba(96,165,250,.6);color:#dbeafe;box-shadow:0 0 12px rgba(59,130,246,.3)}
.sys-node.n-active{box-shadow:0 0 16px rgba(59,130,246,.5);border-color:#60a5fa;animation:nodeGlow 1.5s ease-in-out infinite}
.sys-node.n-fail{border-color:#ef4444;box-shadow:0 0 10px rgba(239,68,68,.3)}
.sys-connector{width:2px;height:20px;background:rgba(255,255,255,.1);position:relative}
.sys-sub-row{display:flex;gap:4px;width:88%}
.sys-sub-node{flex:1;padding:5px 3px;border-radius:5px;text-align:center;font-size:9px;font-weight:700;transition:all .4s}
.sys-sub-node.sn-gray{background:rgba(148,163,184,.08);border:1.5px solid rgba(148,163,184,.25);color:#94a3b8}
.sys-sub-node.sn-orange{background:rgba(249,115,22,.08);border:1.5px solid rgba(249,115,22,.3);color:#fdba74}
.sys-sub-node.sn-purple{background:rgba(168,85,247,.08);border:1.5px solid rgba(168,85,247,.3);color:#c4b5fd}
.sys-sub-node.sn-active{box-shadow:0 0 8px currentColor}
/* Enhanced Particle System */
.particle{position:absolute;border-radius:50%;pointer-events:none;z-index:50}
.particle-trail{position:absolute;border-radius:50%;pointer-events:none;z-index:49;opacity:.4}
.node-pulse{animation:nodePulse .4s ease-out}
/* Action buttons overlay */
.action-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:60;background:rgba(0,0,0,.15);backdrop-filter:blur(1px);opacity:0;pointer-events:none;transition:opacity .4s}
.action-overlay.visible{opacity:1;pointer-events:auto}
.action-btn{padding:12px 28px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.action-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.3)}
.action-btn.blue{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff}
.action-btn.green{background:linear-gradient(135deg,#16a34a,#15803d);color:#fff}
/* Transition overlay */
.transition-overlay{position:absolute;inset:0;bottom:44px;display:flex;align-items:center;justify-content:center;background:rgba(13,17,23,.92);z-index:80;opacity:0;pointer-events:none;transition:opacity .4s}
.transition-overlay.visible{opacity:1;pointer-events:auto}
.transition-text{color:#93c5fd;font-size:16px;font-weight:600;letter-spacing:1px;animation:fadeInUp .5s ease-out}
.bottom-bar{position:absolute;bottom:0;left:0;right:0;height:44px;background:linear-gradient(135deg,#0f172a,#1e293b);display:flex;align-items:center;padding:0 20px;gap:12px;border-top:1px solid rgba(59,130,246,.15);z-index:70}
.step-text{flex:1;font-size:11px;color:rgba(255,255,255,.6);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.progress-dots{display:flex;gap:6px;align-items:center}
.progress-dots .dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .3s}
.progress-dots .dot.active{background:#3b82f6;box-shadow:0 0 6px rgba(59,130,246,.5);transform:scale(1.2)}
.progress-dots .dot.done{background:rgba(255,255,255,.5)}
.kb-hint{font-size:10px;color:rgba(255,255,255,.3);margin-left:8px}
.cycle-container{position:relative;width:400px;height:400px;margin:20px auto}
.cycle-node{position:absolute;padding:12px 16px;border-radius:10px;font-size:12px;font-weight:600;border:2px solid;opacity:0;transform:scale(.8);transition:all .5s cubic-bezier(.4,0,.2,1);white-space:nowrap}
.cycle-node.show{opacity:1;transform:scale(1)}
.cycle-arrow{position:absolute;color:rgba(239,68,68,.6);font-size:18px;opacity:0;transition:opacity .4s}
.cycle-arrow.show{opacity:1}
.cycle-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.stat-callout{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:700;margin:4px;opacity:0;transform:translateY(10px);transition:all .5s}
.stat-callout.show{opacity:1;transform:translateY(0)}
.arch-half{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px}
.arch-half.left-arch{background:#0d1117;border-right:1px solid rgba(239,68,68,.15)}
.arch-half.right-arch{background:#0d1117}
.arch-title{font-size:16px;font-weight:700;margin-bottom:24px;letter-spacing:1px}
.arch-box{padding:14px 20px;border-radius:10px;text-align:center;margin:6px 0;font-size:12px;font-weight:600;opacity:0;transform:translateY(15px);transition:all .5s}
.arch-box.show{opacity:1;transform:translateY(0)}
.arch-line{width:2px;height:24px;margin:0 auto;opacity:0;transition:opacity .5s}
.arch-line.show{opacity:1}
.arch-row{display:flex;gap:12px;margin-top:8px}
.metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;max-width:900px;width:100%}
.metric-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:32px 20px;text-align:center;opacity:0;transform:translateY(20px);transition:all .6s}
.metric-card.show{opacity:1;transform:translateY(0)}
.metric-card:hover{border-color:rgba(59,130,246,.3);background:rgba(59,130,246,.03)}
.metric-icon{font-size:28px;margin-bottom:8px}
.metric-num{font-size:36px;font-weight:800;margin:8px 0;font-family:'Segoe UI',monospace;color:#f0f9ff}
.metric-label{font-size:12px;color:rgba(255,255,255,.5);margin-top:4px}
.metric-change{font-size:10px;color:rgba(255,255,255,.35);margin-top:8px;padding:3px 10px;background:rgba(255,255,255,.05);border-radius:8px;display:inline-block}
.slogan{font-size:20px;font-weight:700;color:#93c5fd;letter-spacing:3px;margin-top:40px;text-align:center;opacity:0;transition:opacity 1s}
.slogan.show{opacity:1}
.typing-cursor::after{content:'|';animation:blink .7s step-end infinite;color:#3b82f6;font-weight:700}
.ai-panel{background:#f0f9ff;border:1px solid #bfdbfe;border-radius:8px;padding:12px;margin:10px 16px;opacity:0;transform:translateY(10px);transition:all .4s}
.ai-panel.show{opacity:1;transform:translateY(0)}
.ai-title{font-size:12px;font-weight:700;color:#1d4ed8;margin-bottom:8px;display:flex;align-items:center;gap:4px}
.pain-overlay{position:absolute;inset:0;background:rgba(220,38,38,.05);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;transition:opacity .5s;pointer-events:none;z-index:10}
.pain-overlay.show{opacity:1}
.empty-state{text-align:center;padding:30px 20px}
.empty-num{font-size:48px;font-weight:800;color:#dc2626}
.approval-chain{display:flex;align-items:center;gap:4px;margin:8px 0;flex-wrap:wrap;justify-content:center}
.approval-node{padding:4px 8px;background:#fef3c7;border:1px solid #fde68a;border-radius:4px;font-size:10px;color:#92400e;opacity:0;transition:all .4s}
.approval-node.show{opacity:1}
.approval-arrow{color:#d1d5db;font-size:10px;opacity:0;transition:opacity .4s}
.approval-arrow.show{opacity:1}
.sim-bar{height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden;margin:6px 0}
.sim-fill{height:100%;background:linear-gradient(90deg,#16a34a,#4ade80);border-radius:3px;width:0;transition:width 1.5s ease-out}
/* 3b scroll table */
.scroll-tbl-wrap{max-height:180px;overflow-y:auto;border:1px solid #e5e7eb;border-radius:6px;margin:8px 0}
.dup-highlight td{background:#fef2f2!important;border-color:#fca5a5!important}
@keyframes blink{50%{opacity:0}}
@keyframes nodeGlow{0%,100%{box-shadow:0 0 12px rgba(59,130,246,.3)}50%{box-shadow:0 0 20px rgba(59,130,246,.6)}}
@keyframes nodePulse{0%{box-shadow:0 0 0 0 currentColor}100%{box-shadow:0 0 20px 4px transparent}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
@keyframes particleMove{0%{opacity:1}100%{opacity:1}}
/* Cursor animation */
#simCursor{position:fixed;z-index:99999;pointer-events:none;opacity:0;transition:opacity .3s}
#simCursor.visible{opacity:1}
.cursor-ring{position:absolute;top:-18px;left:-18px;width:44px;height:44px;border-radius:50%;border:2px solid #4fc3f7;box-shadow:0 0 15px #4fc3f7,0 0 30px #4fc3f7;animation:ringPulse 1.5s ease-in-out infinite;pointer-events:none}
@keyframes ringPulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}
@keyframes cursorClick{0%{transform:scale(1)}30%{transform:scale(.6)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
</style>
</head>
<body>
<div class="header">
  <h1>物料管家 · 物料梳理能力演示</h1>
  <div class="header-right">
    <div class="scene-nav" id="sceneNav"></div>
    <span class="scene-badge" id="sceneBadge">场景 1/5</span>
  </div>
</div>
<div class="main" id="mainArea"></div>
<div class="transition-overlay" id="transOverlay"><span class="transition-text" id="transText"></span></div>
<div class="bottom-bar">
  <span class="step-text" id="stepText">准备开始...</span>
  <div class="progress-dots" id="dots"></div>
  <span class="kb-hint">← → Space</span>
</div>
<script>
const IMG='./images/';
let scene=0, phase='idle', animTimers=[], paused=false, inScene3b=false;
function clearAnim(){animTimers.forEach(t=>{clearTimeout(t);clearInterval(t)});animTimers=[];}
function delay(ms){return new Promise(r=>{const t=setTimeout(r,ms);animTimers.push(t);})}

const SCENES=[
  {id:'s1',title:'痛点引入 — 恶性循环',type:'full'},
  {id:'s2',title:'模糊搜索 vs AI属性补全',type:'split'},
  {id:'s3',title:'搜不到 vs 相似度匹配',type:'split'},
  {id:'s4',title:'技术架构总览',type:'full'},
  {id:'s5',title:'价值总结',type:'full'}
];

function $(id){return document.getElementById(id)}
function setHTML(id,html){const el=$(id);if(el)el.innerHTML=html;}
function showEl(el){if(typeof el==='string')el=$(el);if(el)el.classList.add('show');}
function hideEl(el){if(typeof el==='string')el=$(el);if(el)el.classList.remove('show');}

// ===== CURSOR ANIMATION SYSTEM =====
let cursorEl=null,cursorRing=null,lastPos={x:60,y:60};
function initCursor(){
  cursorEl=document.createElement('div');cursorEl.id='simCursor';
  cursorEl.innerHTML='<svg width="22" height="28" viewBox="0 0 22 28"><path d="M1,1 L1,20 L6,15 L10.5,25 L13.5,23.5 L9,13.5 L16,13.5Z" fill="white" stroke="rgba(0,0,0,.4)" stroke-width="0.8"/></svg><div class="cursor-ring"></div>';
  document.body.appendChild(cursorEl);
  cursorRing=cursorEl.querySelector('.cursor-ring');
}
function hideCursor(){if(cursorEl)cursorEl.classList.remove('visible');}
async function animateCursor(target,cb){
  if(!cursorEl)initCursor();
  const el=typeof target==='string'?document.querySelector(target):target;
  if(!el){if(cb)cb();return;}
  const r=el.getBoundingClientRect();
  const tx=r.left+r.width/2,ty=r.top+r.height/2;
  cursorEl.style.transition='none';
  cursorEl.style.left=lastPos.x+'px';cursorEl.style.top=lastPos.y+'px';
  cursorEl.classList.add('visible');
  await delay(30);
  cursorEl.style.transition='left 500ms cubic-bezier(.4,0,.2,1),top 500ms cubic-bezier(.4,0,.2,1)';
  cursorEl.style.left=tx+'px';cursorEl.style.top=ty+'px';
  await delay(800);
  if(cursorRing){cursorRing.style.animation='cursorClick 250ms ease-out';setTimeout(()=>{if(cursorRing)cursorRing.style.animation='ringPulse 1.5s ease-in-out infinite';},300);}
  await delay(250);
  lastPos={x:tx,y:ty};
  if(cb)cb();
}

function mallNav(keyword,filled,hasAI){
  const v=filled?` value="${keyword}"`:'';const cls=filled?'active':'';
  const ai=hasAI?'<span style="background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff;padding:3px 8px;border-radius:10px;font-size:9px;font-weight:700;margin-left:8px">AI</span>':'';
  return `<div class="mall-nav"><span class="mall-logo">采购商城</span><div class="mall-search"><input class="${cls}" placeholder="请输入物料名称..."${v} readonly><button>搜索</button></div>${ai}<div class="mall-user"></div></div>`;
}
function sysBarLeft(state,desc){
  const mdmCls=state==='fail'?'n-gray n-fail':state==='active'?'n-gray n-active':'n-gray';
  const d=desc||'仅关键字匹配';
  return `<div class="sys-inner"><span class="sys-label">系统链路</span>
    <div class="sys-node n-blue" id="lMall"><span class="n-icon">🏪</span><span class="n-name">采购商城</span></div>
    <div class="sys-connector" id="lcLine"></div>
    <div class="sys-node ${mdmCls}" id="lMDM"><span class="n-icon">🗄️</span><span class="n-name">MDM</span><span class="n-desc">${d}</span></div></div>`;
}
function sysBarRight(state,apiDesc){
  const apiCls=state==='active'||state==='ok'?'n-glow n-active':'n-glow';
  const subActive=state==='ok'?' sn-active':'';const d=apiDesc||'智能中枢';
  return `<div class="sys-inner"><span class="sys-label">系统链路</span>
    <div class="sys-node n-blue" id="rMall"><span class="n-icon">🏪</span><span class="n-name">采购商城</span></div>
    <div class="sys-connector" id="rcLine1"></div>
    <div class="sys-node ${apiCls}" id="rAPI"><span class="n-icon">🧠</span><span class="n-name">物料管家API</span><span class="n-desc">${d}</span></div>
    <div class="sys-connector" id="rcLine2"></div>
    <div class="sys-sub-row">
      <div class="sys-sub-node sn-gray${subActive}" id="rMDM">MDM</div>
      <div class="sys-sub-node sn-orange${subActive}" id="rES">ES</div>
      <div class="sys-sub-node sn-purple${subActive}" id="rAI">AI</div>
    </div></div>`;
}

// ===== ENHANCED PARTICLE SYSTEM =====
function fireParticles(container,startEl,endEl,color,onArrive){
  if(!container||!startEl||!endEl)return;
  const cr=container.getBoundingClientRect();
  const sr=startEl.getBoundingClientRect();
  const er=endEl.getBoundingClientRect();
  const x1=sr.left+sr.width/2-cr.left, y1=sr.top+sr.height/2-cr.top;
  const x2=er.left+er.width/2-cr.left, y2=er.top+er.height/2-cr.top;
  const dur=800;
  // Main particle + 2 trails
  for(let i=0;i<3;i++){
    const p=document.createElement('div');
    const size=i===0?7:4;const op=i===0?1:0.4-i*0.1;
    p.style.cssText=`position:absolute;left:${x1}px;top:${y1}px;width:${size}px;height:${size}px;border-radius:50%;background:${color};box-shadow:0 0 8px ${color};z-index:${50-i};opacity:${op};pointer-events:none;transition:left ${dur+i*120}ms cubic-bezier(.4,0,.2,1),top ${dur+i*120}ms cubic-bezier(.4,0,.2,1);`;
    container.appendChild(p);
    requestAnimationFrame(()=>{p.style.left=x2+'px';p.style.top=y2+'px';});
    setTimeout(()=>p.remove(),dur+i*120+100);
  }
  // Node pulse on arrival
  setTimeout(()=>{
    endEl.classList.add('node-pulse');
    setTimeout(()=>endEl.classList.remove('node-pulse'),400);
    if(onArrive)onArrive();
  },dur);

    tblRows+=`<tr class="${isDup}"><td style="font-size:10px;color:#6b7280">${codes[i]}</td><td style="font-size:10px">${names[i]}</td><td style="font-size:10px;color:#9ca3af">${i===0||i===7||i===9?'<span style="color:#dc2626;font-weight:700">⚠️重复</span>':'正常'}</td></tr>`;
  }
  setHTML('s3bLBody',`<div style="padding:12px 16px"><div style="font-size:12px;font-weight:600;color:#374151;margin-bottom:8px">📦 商城物料池（1000条）</div><div class="scroll-tbl-wrap" id="s3bScroll"><table class="data-tbl"><thead><tr><th>编码</th><th>名称</th><th>状态</th></tr></thead><tbody>${tblRows}</tbody></table></div><div id="s3bPainNote" style="opacity:0;transition:opacity .5s;margin-top:10px;padding:10px;background:#fef2f2;border:1px solid #fecaca;border-radius:6px;font-size:11px;color:#991b1b;text-align:center"><b>重复物料占比约30%</b>，人工排查需2-3周</div><div id="s3bPainGrow" style="opacity:0;transition:opacity .5s;margin-top:6px;padding:8px;background:#fef3c7;border:1px solid #fde68a;border-radius:6px;font-size:11px;color:#92400e;text-align:center">⚠️ 持续增长中，每月新增重复15-20条</div></div>`);
  await delay(500);
  // Auto scroll the table
  const scrollEl=$('s3bScroll');
  if(scrollEl){let scrollPos=0;const scrollIv=setInterval(()=>{scrollPos+=1;scrollEl.scrollTop=scrollPos;if(scrollPos>80)clearInterval(scrollIv);},30);animTimers.push(scrollIv);}
  await delay(2500);
  // Highlight duplicates note
  const note=$('s3bPainNote');if(note)note.style.opacity='1';
  await delay(2000);
  // Growing pain
  const grow=$('s3bPainGrow');if(grow)grow.style.opacity='1';
  await delay(2000);
  // Dim left + show button
  phase='left-done';
  const leftHalf=$('s3bLeft');if(leftHalf)leftHalf.classList.add('dimmed');
  const overlay=$('s3bActionMid');if(overlay)overlay.classList.add('visible');
  updateUI();
}
async function playScene3bRight(){
  phase='playing-right';
  const overlay=$('s3bActionMid');if(overlay)overlay.classList.remove('visible');
  const rightHalf=$('s3bRight');if(rightHalf)rightHalf.classList.remove('dimmed');
  setHTML('s3bRSys',sysBarRight('idle','批量梳理引擎'));
  setHTML('s3bRBody',`<div style="padding:12px 16px"><div style="font-size:12px;font-weight:600;color:#374151;margin-bottom:10px">🧹 物料梳理面板</div><div style="background:#f8fafc;border:1px solid #e5e7eb;border-radius:8px;padding:16px;text-align:center"><div style="font-size:11px;color:#6b7280;margin-bottom:10px">选择物料池进行智能扫描</div><button id="s3bScanBtn" style="background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;border:none;padding:10px 24px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer" onclick="return false">🔍 开始扫描</button></div><div id="s3bProgress" style="margin-top:12px;opacity:0;transition:opacity .4s"><div style="font-size:11px;color:#6b7280;margin-bottom:4px" id="s3bProgText">分析中 0/1000</div><div style="height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden"><div id="s3bProgBar" style="height:100%;background:linear-gradient(90deg,#3b82f6,#22c55e);border-radius:3px;width:0;transition:width 3s ease-out"></div></div></div><div id="s3bResult" style="margin-top:12px;opacity:0;transition:opacity .5s"></div></div>`);
  await delay(800);
  // Cursor animation: click scan button
  await animateCursor('#s3bScanBtn',()=>{});
  // Simulate click scan
  const container=$('s3bRight');const scanBtn=$('s3bScanBtn');const apiEl=$('rAPI');
  // Particle: scan→API (blue)
  fireParticles(container,scanBtn,apiEl,'#3b82f6');
  setHTML('s3bRSys',sysBarRight('active','批量梳理引擎'));
  await delay(800);
  // API dispatches to MDM+AI
  setHTML('s3bRSys',sysBarRight('ok','批量梳理引擎'));
  await delay(500);
  // Progress bar
  const prog=$('s3bProgress');if(prog)prog.style.opacity='1';
  const bar=$('s3bProgBar');if(bar)bar.style.width='100%';
  const progText=$('s3bProgText');
  let count=0;const countIv=setInterval(()=>{count+=50;if(count>1000)count=1000;if(progText)progText.textContent=`分析中 ${count}/1000`;if(count>=1000)clearInterval(countIv);},150);animTimers.push(countIv);
  await delay(3500);
  // Return particle (green)
  const apiEl2=$('rAPI');const resArea=$('s3bResult');
  if(apiEl2&&resArea)fireParticles(container,apiEl2,resArea,'#22c55e');
  await delay(800);
  // Show results
  const result=$('s3bResult');if(result)result.style.opacity='1';
  setHTML('s3bResult',`<div style="background:#dcfce7;border:1px solid #86efac;border-radius:8px;padding:12px;margin-bottom:10px"><div style="font-size:14px;font-weight:700;color:#166534;margin-bottom:8px">📊 发现 312 组重复物料</div><div style="font-size:11px;color:#374151;line-height:2"><div>• 六角螺栓M10×50 × 3条 — 相似度 <b style="color:#16a34a">95%</b></div><div>• 内六角螺栓M8×30 × 2条 — 相似度 <b style="color:#16a34a">92%</b></div><div>• 弹簧垫圈Φ10 × 2条 — 相似度 <b style="color:#d97706">88%</b></div></div></div><div style="display:flex;gap:8px;margin-bottom:10px"><button id="s3bMergeBtn" style="background:#16a34a;color:#fff;border:none;padding:8px 16px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer">✓ 建议合并</button><button style="background:#3b82f6;color:#fff;border:none;padding:8px 14px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer">📝 补充属性</button></div><div style="padding:10px;background:#f0f9ff;border:1px solid #bfdbfe;border-radius:6px;font-size:11px;color:#1d4ed8;text-align:center;font-weight:600">预计精简 30%，年节省 ¥45万</div>`);
  await delay(800);
  await animateCursor('#s3bMergeBtn',()=>{});
  await delay(1200);
  phase='scene-done';inScene3b=false;
  const endOverlay=$('s3bActionEnd');if(endOverlay)endOverlay.classList.add('visible');
  updateUI();
}

  return `<div class="scene-full active" id="s4" style="flex-direction:row;padding:0">
    <div class="arch-half left-arch"><div class="arch-title" style="color:#f87171">传统架构</div><div class="arch-box" id="a4L1" style="background:rgba(59,130,246,.1);border:2px solid rgba(59,130,246,.3);color:#93c5fd">🏪 采购商城<div style="font-size:9px;opacity:.6;margin-top:2px">用户搜索入口</div></div><div class="arch-line" id="a4Ln1" style="background:rgba(148,163,184,.3)"></div><div class="arch-box" id="a4L2" style="background:rgba(148,163,184,.08);border:2px solid rgba(148,163,184,.3);color:#94a3b8">🗄️ MDM主数据<div style="font-size:9px;opacity:.6;margin-top:2px">仅支持精确匹配，无智能补全</div></div><div style="margin-top:20px;padding:10px 16px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;font-size:11px;color:#fca5a5;text-align:center;max-width:220px;opacity:0" id="a4LNote">单一链路 · 搜索准确率仅30%</div></div>
    <div class="arch-half right-arch"><div class="arch-title" style="color:#4ade80">物料管家架构</div><div class="arch-box" id="a4R1" style="background:rgba(59,130,246,.1);border:2px solid rgba(59,130,246,.3);color:#93c5fd">🏪 采购商城<div style="font-size:9px;opacity:.6;margin-top:2px">用户搜索入口</div></div><div class="arch-line" id="a4Ln2" style="background:rgba(96,165,250,.4)"></div><div class="arch-box" id="a4R2" style="background:rgba(59,130,246,.12);border:2px solid rgba(96,165,250,.5);color:#dbeafe">🧠 物料管家API<div style="font-size:9px;opacity:.6;margin-top:2px">智能中枢 · 多源聚合</div></div><div class="arch-line" id="a4Ln3" style="background:rgba(96,165,250,.3)"></div><div class="arch-row" id="a4Row"><div class="arch-box" id="a4R3" style="background:rgba(148,163,184,.08);border:1.5px solid rgba(148,163,184,.3);color:#94a3b8;font-size:11px">🗄️ MDM<div style="font-size:8px;opacity:.6;margin-top:2px">主数据查询</div></div><div class="arch-box" id="a4R4" style="background:rgba(249,115,22,.08);border:1.5px solid rgba(249,115,22,.3);color:#fdba74;font-size:11px">🔍 ES引擎<div style="font-size:8px;opacity:.6;margin-top:2px">全文模糊搜索</div></div><div class="arch-box" id="a4R5" style="background:rgba(168,85,247,.08);border:1.5px solid rgba(168,85,247,.3);color:#c4b5fd;font-size:11px">🤖 AI模型<div style="font-size:8px;opacity:.6;margin-top:2px">属性补全+相似匹配</div></div></div><div style="margin-top:20px;padding:10px 16px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:8px;font-size:11px;color:#86efac;text-align:center;max-width:260px;opacity:0" id="a4RNote">多源聚合 · 搜索准确率 92% ↑207%</div></div>
    <div class="action-overlay" id="s4Action"><button class="action-btn green" onclick="nextScene()">下一场景 →</button></div>
  </div>`;
}
async function playScene4(){
  phase='playing';showEl('a4L1');await delay(400);
  const ln1=$('a4Ln1');if(ln1)ln1.classList.add('show');await delay(300);
  showEl('a4L2');await delay(400);const lNote=$('a4LNote');if(lNote)lNote.style.opacity='1';await delay(1500);
  showEl('a4R1');await delay(400);const ln2=$('a4Ln2');if(ln2)ln2.classList.add('show');await delay(300);

// ===== SCENE 5 =====
function buildScene5(){
  return `<div class="scene-full active" id="s5">
    <h2 style="color:#f0f9ff;font-size:22px;font-weight:700;margin-bottom:6px">📊 价值总结</h2>
    <p style="color:rgba(255,255,255,.4);font-size:12px;margin-bottom:30px">物料管家核心业务指标提升</p>
    <div class="metric-grid">
      <div class="metric-card" id="mc1"><div class="metric-icon">🎯</div><div class="metric-label">物料去重率提升</div><div class="metric-num" id="mv1">0%</div><div class="metric-change">↑ 显著提升</div></div>
      <div class="metric-card" id="mc2"><div class="metric-icon">🔍</div><div class="metric-label">搜索准确率</div><div class="metric-num" id="mv2">0%</div><div class="metric-change">30% → 92%</div></div>
      <div class="metric-card" id="mc3"><div class="metric-icon">💰</div><div class="metric-label">年采购成本节省</div><div class="metric-num" id="mv3">¥0万</div><div class="metric-change">直接降本</div></div>
      <div class="metric-card" id="mc4"><div class="metric-icon">⚡</div><div class="metric-label">平均查找时间</div><div class="metric-num" id="mv4">0秒</div><div class="metric-change">8分钟 → 15秒</div></div>
    </div>
    <div class="slogan" id="sloganText">物料管家 — 让每一次搜索都有答案</div>
  </div>`;
}
async function playScene5(){
  phase='playing';await delay(400);
  const cards=['mc1','mc2','mc3','mc4'];for(const id of cards){showEl(id);await delay(200);}await delay(300);
  const metrics=[{id:'mv1',target:65,prefix:'',suffix:'%'},{id:'mv2',target:92,prefix:'',suffix:'%'},{id:'mv3',target:320,prefix:'¥',suffix:'万'},{id:'mv4',target:15,prefix:'',suffix:'秒'}];
  metrics.forEach(m=>{let cur=0;const step=Math.max(1,Math.ceil(m.target/40));const iv=setInterval(()=>{cur=Math.min(cur+step,m.target);const el=$(m.id);if(el)el.textContent=m.prefix+cur+m.suffix;if(cur>=m.target)clearInterval(iv);},40);animTimers.push(iv);});
  await delay(2000);showEl('sloganText');phase='scene-done';updateUI();
}

// ===== CONTROLLER =====
function loadScene(idx){
  clearAnim();paused=false;phase='idle';inScene3b=false;scene=idx;hideCursor();
  const main=$('mainArea');
  switch(idx){
    case 0:main.innerHTML=buildScene1();playScene1();break;
    case 1:main.innerHTML=buildScene2();playScene2Left();break;
    case 2:main.innerHTML=buildScene3();playScene3Left();break;
    case 3:main.innerHTML=buildScene4();playScene4();break;
    case 4:main.innerHTML=buildScene5();playScene5();break;
  }
  updateUI();
}
function triggerRight(){
  if(phase!=='left-done')return;
  if(scene===1)playScene2Right();
  else if(scene===2&&!inScene3b)playScene3Right();
  else if(scene===2&&inScene3b)playScene3bRight();
}
function nextScene(){if(scene<SCENES.length-1)loadScene(scene+1);}
function prevScene(){if(scene>0)loadScene(scene-1);}

function updateUI(){
  $('sceneBadge').textContent=`场景 ${scene+1}/5`;
  $('stepText').textContent=inScene3b?'[历史物料梳理 — 批量去重]':`[${SCENES[scene].title}]`;
  let dotsHtml='';for(let i=0;i<5;i++){const cls=i<scene?'done':i===scene?'active':'';dotsHtml+=`<span class="dot ${cls}"></span>`;}
  $('dots').innerHTML=dotsHtml;
  // Update scene nav
  let navHtml='';for(let i=0;i<SCENES.length;i++){
    const cls=i===scene?'active':'';
    navHtml+=`<span class="nav-dot ${cls}" onclick="navToScene(${i})"><span class="nav-tip">${SCENES[i].title}</span></span>`;
  }
  $('sceneNav').innerHTML=navHtml;
}
function navToScene(idx){if(idx>=0&&idx<SCENES.length){clearAnim();loadScene(idx);}}

document.addEventListener('keydown',e=>{
  if(e.code==='ArrowRight'){e.preventDefault();if(phase==='left-done')triggerRight();else if(phase==='scene-done')nextScene();}
  if(e.code==='ArrowLeft'){e.preventDefault();prevScene();}
  if(e.code==='Space'){e.preventDefault();}
});
window.addEventListener('DOMContentLoaded',()=>loadScene(0));
</script>
