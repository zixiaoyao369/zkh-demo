    .logo-icon { width: 36px; height: 36px; background: #fff; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; color: #c0392b; }

    .logo-sub { color: rgba(255,255,255,0.7); font-size: 11px; margin-top: 1px; }
    .nav-back { color: rgba(255,255,255,0.85); font-size: 13px; cursor: pointer; margin-left: auto; display: flex; align-items: center; gap: 4px; transition: color 0.15s; text-decoration: none; }

    /* Main */
    .main { max-width: 1200px; margin: 0 auto; padding: 16px 24px; }
    .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #999; margin-bottom: 14px; flex-wrap: wrap; }

    .detail-main-img { width: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: #f9f9f9; position: relative; overflow: hidden; }

    .detail-thumbs { display: flex; gap: 8px; padding: 10px; border-top: 1px solid #eee; }
    .thumb { width: 58px; height: 58px; border: 2px solid transparent; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; background: #f5f5f5; overflow: hidden; transition: border-color 0.15s; }
    .thumb.active { border-color: #c0392b; }
    .thumb:hover { border-color: #c0392b; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .source-badge-detail { position: absolute; top: 10px; left: 10px; background: #1677ff; color: #fff; font-size: 11px; padding: 3px 8px; border-radius: 3px; font-weight: 600; z-index: 2; }

    .detail-info { background: #fff; border: 1px solid #e8e8e8; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .detail-title { font-size: 18px; font-weight: 700; line-height: 1.55; margin-bottom: 14px; }
    .detail-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
    .detail-spec { font-size: 13px; color: #666; }
    .detail-brand { font-size: 13px; color: #666; background: #f5f5f5; padding: 2px 8px; border-radius: 3px; }
    .detail-badge { font-size: 11px; padding: 3px 10px; border-radius: 10px; font-weight: 600; }
    .badge-standard { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
    .badge-pending { background: #fff7e6; color: #fa8c16; border: 1px solid #ffd591; }

    .price-box { background: #fff9f8; border: 1px solid #fde0dd; border-radius: 6px; padding: 14px 16px; margin-bottom: 16px; }
    .price-label { font-size: 11px; color: #999; margin-bottom: 4px; }
    .price-main { font-size: 30px; font-weight: 700; color: #c0392b; }
    .price-unit { font-size: 13px; color: #999; font-weight: 400; }
    .price-saving { font-size: 11px; color: #27ae60; margin-top: 4px; }

    .attr-row { display: flex; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
    .attr-row:last-child { border-bottom: none; }
    .attr-key { min-width: 80px; color: #999; }
    .attr-val { color: #333; flex: 1; }
    .spec-tag { display: inline-block; padding: 2px 10px; border: 1px solid #e0e0e0; border-radius: 4px; cursor: pointer; margin-right: 6px; margin-bottom: 4px; font-size: 12px; transition: all 0.15s; }
    .spec-tag:hover { border-color: #c0392b; color: #c0392b; }
    .spec-tag.active { border-color: #c0392b; color: #c0392b; background: #fff8f7; }
    .qty-input { width: 72px; padding: 5px 8px; border: 1px solid #e0e0e0; border-radius: 4px; font-size: 13px; outline: none; }
    .qty-input:focus { border-color: #c0392b; }

    .detail-actions { display: flex; gap: 10px; margin: 16px 0; }
    .btn-cart { flex: 1; padding: 12px; background: #c0392b; color: #fff; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .btn-cart:hover { background: #a93226; }
    .btn-cart.added { background: #27ae60; }
    .btn-apply { flex: 1; padding: 12px; background: #ff8c00; color: #fff; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .btn-apply:hover { background: #e67e00; }
    .btn-fav { padding: 12px 20px; border: 1px solid #ddd; border-radius: 6px; background: #fff; color: #666; cursor: pointer; font-size: 13px; transition: all 0.15s; }
    .btn-fav:hover { border-color: #c0392b; color: #c0392b; }
    .guarantees { display: flex; gap: 20px; font-size: 12px; color: #999; }

    .multi-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .multi-sub { font-size: 12px; color: #999; font-weight: 400; }

    table { width: 100%; border-collapse: collapse; }
    thead th { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 12px; text-align: left; border-bottom: 2px solid #f0f0f0; background: #fafafa; }
    tbody td { padding: 12px; border-bottom: 1px solid #f5f5f5; font-size: 13px; vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #fafafa; }
    tbody tr.best-row td { background: #fff9f8; }

    .s-name { font-weight: 500; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .tag { font-size: 9px; padding: 2px 5px; border-radius: 2px; font-weight: 700; color: #fff; }
    .tag-zkh { background: #1a6fc4; }
    .tag-best { background: #c0392b; }
    .tag-mfr { background: #27ae60; }
    .s-price { font-size: 17px; font-weight: 700; color: #c0392b; }
    .s-price.norm { color: #333; }
    .s-unit { font-size: 11px; color: #999; }
    .s-delivery { font-size: 12px; color: #666; }
    .s-stock.in { color: #27ae60; font-size: 12px; }
    .s-stock.low { color: #f39c12; font-size: 12px; }

    .btn-select { padding: 6px 16px; background: #1a6fc4; color: #fff; border: none; border-radius: 4px; font-size: 12px; cursor: pointer; font-weight: 500; transition: background 0.15s; }
    .btn-select:hover { background: #155da3; }
    .btn-detail { padding: 6px 14px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px; cursor: pointer; background: #fff; color: #666; margin-left: 6px; transition: all 0.15s; }
    .btn-detail:hover { border-color: #c0392b; color: #c0392b; }

    .params-section { background: #fff; border: 1px solid #e8e8e8; border-radius: 8px; padding: 18px; margin-bottom: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }

    .params-table tr:last-child td { border-bottom: none; }
    .params-table .param-key { width: 120px; color: #999; background: #fafafa; }
    .params-table .param-val { color: #333; }

    .demo-expand-btn { position: fixed; bottom: 12px; right: 12px; background: rgba(30,30,30,0.85); color: #fff; border: none; padding: 8px 14px; border-radius: 20px; cursor: pointer; font-size: 12px; z-index: 99998; display: none; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }

    .not-found-btn { display: inline-block; padding: 10px 28px; background: #c0392b; color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; transition: background 0.15s; }

      .detail-info { padding: 14px; }
      .detail-title { font-size: 16px; }
      .main { padding: 12px 16px; }
      .header-top { padding: 10px 16px; }
    }

// Load listed products from localStorage
(function loadListedProducts() {
  try {
    const listed = JSON.parse(localStorage.getItem('listedProducts') || '[]');
    if (listed.length > 0) {
      listed.forEach(p => {
        if (!products.find(existing => existing.name === p.name)) {
          if (!p.cat2) p.cat2 = p.cat;
          if (!p.cat3) p.cat3 = p.cat;
          if (!p.unit) p.unit = '个';
          if (!p.suppliers || p.suppliers.length === 0) {
            p.suppliers = [{name:'外部引入',tags:['最优价'],price:0,delivery:'次日达',stock:'in',stockText:'库存充足',detailUrl:'#'}];
          }
          products.unshift(p);
        }
      });
    }
  } catch(e) {}
})();

// ========== 占位符颜色映射 ==========
function getPlaceholderColor(cat) {
  const colors = {
    '紧固件': '#5b8c5a', '电气电工': '#3a7bd5', '劳保防护': '#f5a623',
    '管阀': '#8e44ad', '五金工具': '#e74c3c', '润滑油脂': '#f39c12',
    '密封件': '#1abc9c', '清洁用品': '#2ecc71', '仪器仪表': '#3498db',
    '传动件': '#9b59b6', '化工原料': '#e67e22'
  };
  return colors[cat] || '#999';
}

// ========== URL参数解析 ==========
function getProductId() {
  const params = new URLSearchParams(window.location.search);
  return params.get('id') || '';
}

// ========== 查找商品 ==========
function findProduct(idStr) {
  if (!idStr) return null;

  // 外部商品: id=ext_N
  if (idStr.startsWith('ext_')) {
    const idx = parseInt(idStr.substring(4), 10);
    if (!isNaN(idx) && idx >= 0 && idx < EXTERNAL_PRODUCTS.length) {
      const p = EXTERNAL_PRODUCTS[idx];
      return { ...p, isExternal: true, extIdx: idx };
    }
    return null;
  }

  // 内部商品: id=N
  const id = parseInt(idStr, 10);
  if (!isNaN(id)) {
    const p = products.find(x => x.id === id);
    if (p) return { ...p, isExternal: false };
  }
  return null;
}

// ========== 渲染详情页 ==========
function renderDetail() {
  const idStr = getProductId();
  const p = findProduct(idStr);

  if (!p) {
    // 如果找不到id，显示默认商品（id=1）
    const defaultProduct = findProduct('1');
    if (defaultProduct) {
      renderWithProduct(defaultProduct);
      return;
    }
    renderNotFound();
    return;
  }

  renderWithProduct(p);
}

function renderWithProduct(p) {
  // 更新面包屑
  document.getElementById('breadcrumbName').textContent = p.name.substring(0, 24) + (p.name.length > 24 ? '…' : '');
  document.title = p.name + ' - 巨石集团采购平台';

  if (p.isExternal) {
    renderExternalDetail(p);
  } else {
    renderInternalDetail(p);
  }
}

        <div class="detail-actions">

    ${p.suppliers.length > 1 ? `
    <div class="multi-section">

        <span class="multi-sub">共 ${p.suppliers.length} 家供应商，平台为您智能比价</span>

              <td><span class="s-delivery">${s.delivery}</span></td>
              <td><span class="s-stock ${s.stock}">${s.stockText}</span></td>

    <div class="params-section">
      <div class="params-title">📋 商品参数</div>
      <table class="params-table">
        <tr><td class="param-key">品类</td><td class="param-val">${p.cat} › ${p.cat2} › ${p.cat3}</td></tr>
        <tr><td class="param-key">规格型号</td><td class="param-val">${p.cat3 || p.cat2}</td></tr>
        <tr><td class="param-key">品牌</td><td class="param-val">${p.brand}</td></tr>
        <tr><td class="param-key">单位</td><td class="param-val">${p.unit}</td></tr>
        <tr><td class="param-key">标准号</td><td class="param-val">GB/T ${p.id < 10 ? '5782' : '相关标准'}</td></tr>
        <tr><td class="param-key">材质</td><td class="param-val">${p.brand.includes('304') || p.brand.includes('不锈钢') ? '不锈钢304' : p.brand.includes('碳') ? '碳钢' : '标准材质'}</td></tr>
        <tr><td class="param-key">标准化状态</td><td class="param-val">${p.badge || '标准件'}</td></tr>

    ${related.length > 0 ? `
    <div class="related-section">
      <div class="related-title">相关商品推荐</div>
      <div class="related-grid">
        ${related.map(r => {
          const rBest = r.suppliers[0];
          return `<div class="product-card" onclick="window.location.href='product-detail.html?id=${r.id}'">
            <div class="product-img">
              <img src="${r.img}" alt="${r.name}" onerror="this.style.display='none'">
              ${r.suppliers.length > 1 ? `<span class="multi-badge">一品${r.suppliers.length}商</span>` : ''}
              ${r.badge === '已标准化' ? '<span style="position:absolute;top:7px;right:7px;background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f;font-size:11px;padding:1px 6px;border-radius:10px;z-index:2;">已标准化</span>' : ''}
              ${r.badge === '待梳理' ? '<span style="position:absolute;top:7px;right:7px;background:#fff7e6;color:#fa8c16;border:1px solid #ffd591;font-size:11px;padding:1px 6px;border-radius:10px;z-index:2;">待梳理</span>' : ''}
            </div>
            <div class="product-info">
              <div class="product-name">${r.name}</div>
              <div class="product-price">¥${rBest.price.toFixed(2)}<span class="product-price-unit">/${r.unit}</span></div>

}

// ========== 渲染外部商品详情 ==========
function renderExternalDetail(p) {
  const related = products.filter(x => x.cat === p.cat).slice(0, 5);

  // 多图模拟
  const allImages = [p.img];
  products.forEach(x => {
    if (x.img !== p.img && !allImages.includes(x.img) && allImages.length < 4) {
      allImages.push(x.img);
    }
  });
  while (allImages.length < 4) allImages.push(p.img);

  document.getElementById('detailContent').innerHTML = `
    <div class="detail-layout">
      <div class="detail-img-box">
        <div class="detail-main-img" id="mainImgWrap">
          <img id="mainImg" src="${allImages[0]}" alt="${p.name}" onerror="this.style.display='none';document.getElementById('mainPlaceholder').style.display='flex';">
          <div id="mainPlaceholder" style="display:none;width:100%;height:100%;align-items:center;justify-content:center;background:${getPlaceholderColor(p.cat)};font-size:80px;color:rgba(255,255,255,0.6);">${p.name.charAt(0)}</div>
          <span class="source-badge-detail" style="background:#1677ff;">${p.sourceName || '外部渠道'}</span>
        </div>
        <div class="detail-thumbs">
          ${allImages.map((img, i) => `<div class="thumb ${i===0?'active':''}" onclick="switchThumb(this,'${img}')"><img src="${img}" alt="" onerror="this.style.display='none'"></div>`).join('')}
        </div>
      </div>
      <div class="detail-info">
        <div class="detail-title">${p.name}</div>
        <div class="detail-meta">
          <span class="detail-spec">规格型号：${p.spec || p.cat}</span>
          <span class="detail-brand">品牌：${p.brand}</span>
          <span class="detail-badge" style="background:#e6f0ff;color:#1677ff;border:1px solid #b3d8ff;">外部渠道 · 未上架</span>
        </div>
        <div class="price-box">
          <div class="price-label">参考价格（${p.sourceName}）</div>
          <div><span class="price-main">¥${p.price.toFixed(2)}</span><span class="price-unit"> / 个</span></div>
        </div>
        <div>
          <div class="attr-row"><span class="attr-key">供应商</span><span class="attr-val">${p.sourceName || '外部渠道'}</span></div>
          <div class="attr-row"><span class="attr-key">所属类目</span><span class="attr-val">${p.cat}</span></div>
          <div class="attr-row"><span class="attr-key">品牌</span><span class="attr-val">${p.brand}</span></div>
          <div class="attr-row"><span class="attr-key">规格</span><span class="attr-val">${p.spec || '-'}</span></div>
          <div class="attr-row"><span class="attr-key">来源渠道</span><span class="attr-val">${p.sourceName || p.source}</span></div>
        </div>
        <div class="detail-actions">
          <button class="btn-apply" onclick="applyListing('${p.name.replace(/'/g,'')}', '${(p.spec||'').replace(/'/g,'')}', '${p.price}', '${p.source||''}', '${p.sourceName||''}')">📋 申请上架</button>
          <button class="btn-fav" onclick="showToast('♡ 已收藏')">♡ 收藏</button>
        </div>
        <div class="guarantees">
          <span>外部渠道商品</span>
          <span>需申请上架后可采购</span>
        </div>
      </div>
    </div>

    <div class="params-section">
      <div class="params-title">📋 商品参数</div>
      <table class="params-table">
        <tr><td class="param-key">品类</td><td class="param-val">${p.cat}</td></tr>
        <tr><td class="param-key">规格型号</td><td class="param-val">${p.spec || '-'}</td></tr>
        <tr><td class="param-key">品牌</td><td class="param-val">${p.brand}</td></tr>
        <tr><td class="param-key">参考价格</td><td class="param-val" style="color:#c0392b;font-weight:600;">¥${p.price.toFixed(2)}</td></tr>
        <tr><td class="param-key">来源渠道</td><td class="param-val">${p.sourceName || p.source}</td></tr>
        <tr><td class="param-key">上架状态</td><td class="param-val" style="color:#fa8c16;">未上架（需申请）</td></tr>
      </table>
    </div>

    ${related.length > 0 ? `
    <div class="related-section">
      <div class="related-title">相关商品推荐</div>
      <div class="related-grid">
        ${related.map(r => {
          const rBest = r.suppliers[0];
          return `<div class="product-card" onclick="window.location.href='product-detail.html?id=${r.id}'">
            <div class="product-img">
              <img src="${r.img}" alt="${r.name}" onerror="this.style.display='none'">
              ${r.suppliers.length > 1 ? `<span class="multi-badge">一品${r.suppliers.length}商</span>` : ''}
              ${r.badge === '已标准化' ? '<span style="position:absolute;top:7px;right:7px;background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f;font-size:11px;padding:1px 6px;border-radius:10px;z-index:2;">已标准化</span>' : ''}
              ${r.badge === '待梳理' ? '<span style="position:absolute;top:7px;right:7px;background:#fff7e6;color:#fa8c16;border:1px solid #ffd591;font-size:11px;padding:1px 6px;border-radius:10px;z-index:2;">待梳理</span>' : ''}
            </div>
            <div class="product-info">
              <div class="product-name">${r.name}</div>
              <div class="product-price">¥${rBest.price.toFixed(2)}<span class="product-price-unit">/${r.unit}</span></div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>` : ''}
  `;
}

// ========== 未找到商品 ==========
function renderNotFound() {
  document.getElementById('breadcrumbName').textContent = '商品未找到';
  document.getElementById('detailContent').innerHTML = `
    <div class="not-found">
      <div class="not-found-icon">🔍</div>
      <div class="not-found-title">未找到该商品</div>
      <div class="not-found-sub">商品可能已下架或链接有误，请返回商城重新浏览</div>
      <a href="mall.html" class="not-found-btn">返回商城首页</a>
    </div>
  `;
}

// ========== 交互函数 ==========
function switchThumb(thumbEl, imgSrc) {
  document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
  thumbEl.classList.add('active');
  const mainImg = document.getElementById('mainImg');
  const placeholder = document.getElementById('mainPlaceholder');
  mainImg.src = imgSrc;
  mainImg.style.display = '';
  if (placeholder) placeholder.style.display = 'none';
}

function selectSupplier(name, price, unit) {
  showToast('✓ 已选择供应商：' + name + '，单价 ¥' + price.toFixed(2) + '/' + unit);
}

function addToCartFromDetail(product) {
  const qty = parseInt(document.getElementById('qtyInput') ? document.getElementById('qtyInput').value : '1', 10) || 1;
  const existing = cartItems.find(item => item.name === product.name && item.spec === product.spec);
  if (existing) {
    existing.qty += qty;
  } else {
    cartItems.push({...product, qty: qty});
  }
  localStorage.setItem('cartItems', JSON.stringify(cartItems));
  const btn = document.getElementById('btnCart');
  if (btn) {
    btn.classList.add('added');
    btn.textContent = '✓ 已加入采购单';
    setTimeout(() => {
      btn.classList.remove('added');
      btn.textContent = '🛒 加入采购单';
    }, 2000);
  }
  showToast('✓ 已加入采购单：' + product.name + ' × ' + qty);
}

function applyListing(name, spec, price, source, sourceName) {
  const params = new URLSearchParams({
    name: name,
    spec: spec,
    price: price,
    source: source,
    sourceName: sourceName
  });
  window.location.href = 'product-review.html?' + params.toString();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function toggleDemoBar() {
  const bar = document.getElementById('demoBar');
  const btn = document.querySelector('.demo-expand-btn');
  bar.classList.toggle('collapsed');
  btn.style.display = bar.classList.contains('collapsed') ? 'block' : 'none';
}

// ========== 初始化 ==========
document.addEventListener('DOMContentLoaded', renderDetail);
</script>
